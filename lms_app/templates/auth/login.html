{% extends 'base.html' %}

{% block title %}Giriş Yap - KTÜ LMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg p-4">
            <h2 class="text-center text-primary mb-4">Giriş Yap</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}  <button type="submit" class="btn btn-primary w-100 mt-3">Giriş Yap</button>
            </form>
            <p class="text-center mt-3">Hesabın yok mu? <a href="/register/">Hemen Kayıt Ol</a></p>
        </div>
    </div>
</div>
{% endblock %}
