{% extends 'base.html' %}
{% block title %}E-posta Gönderildi - KTÜ LMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center mt-5">
        <div class="card shadow border-0 p-5">
            <i class="fa-solid fa-envelope-circle-check fa-4x text-success mb-3"></i>
            <h3 class="text-primary fw-bold">E-posta Gönderildi!</h3>
            <p class="text-muted mt-2">Eğer sistemimizde kayıtlı bir e-posta adresi girdiyseniz, şifre sıfırlama bağlantısını içeren bir e-posta gönderdik.</p>
            <a href="{% url 'login' %}" class="btn btn-outline-primary mt-3 fw-bold">Giriş Sayfasına Dön</a>
        </div>
    </div>
</div>
{% endblock %}
